server:
  port: 8081

spring:
  application:
    name: user-service

  # 1. Database Configuration (PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/netflix_user_db
    username: postgres
    password: postgre123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 2. Redis Configuration for Refresh Tokens & Active Device Sessions
  data:
    redis:
      host: localhost
      port: 6379

  # 3. Kafka Producer Configuration for Async Domain Events
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: userRegisteredEvent:com.Netfilx.User.Event.UserRegisteredEvent

# 4. JWT & Session Expiration Settings
jwt:
  secret: TaK+HaV^uvCHEFsEVfypW#7g9^k*Z8$VTaK+HaV^uvCHEFsEVfypW#7g9^k*Z8$V
  access-token-expiration-ms: 900000        # 15 Minutes
  refresh-token-expiration-ms: 2592000000    # 30 Days (2,592,000,000 ms)

# 5. Eureka Registration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true